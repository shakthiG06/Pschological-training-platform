{% extends "base.html" %}
{% block title %}Access Denied | PsySim{% endblock %}

{% block content %}

<div class="min-h-[60vh] flex items-center justify-center">
    <div class="st-card p-12 text-center max-w-lg relative overflow-hidden">
        
        <!-- Glitch Effect Background -->
        <div class="absolute inset-0 opacity-5">
            <div class="absolute inset-0" style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(225, 29, 72, 0.1) 2px, rgba(225, 29, 72, 0.1) 4px);"></div>
        </div>
        
        <!-- Icon -->
        <div class="w-24 h-24 rounded-lg bg-red-900/30 border border-red-900/50 flex items-center justify-center mx-auto mb-8 relative z-10 animate-pulse">
            <i data-lucide="lock" class="w-12 h-12 text-red-500"></i>
        </div>
        
        <!-- Title -->
        <h1 class="font-stranger text-3xl md:text-4xl neon-text tracking-wider mb-4 relative z-10 flicker">
            ACCESS DENIED
        </h1>
        
        <!-- Christmas Lights -->
        <div class="christmas-lights mb-8 justify-center relative z-10">
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
        </div>
        
        <!-- Message -->
        <p class="text-gray-400 mb-2 relative z-10">
            The gateway to the Upside Down is locked.
        </p>
        <p class="text-gray-500 mb-8 relative z-10">
            You must complete the course 
            <span class="text-red-400 font-medium">{{ course.title }}</span>
            before accessing this AI patient simulation.
        </p>
        
        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center relative z-10">
            <a href="/courses/" class="st-btn">
                <i data-lucide="book-open" class="w-4 h-4"></i>
                Go to Courses
            </a>
            <a href="/student/" class="st-btn-outline">
                <i data-lucide="home" class="w-4 h-4"></i>
                Dashboard
            </a>
        </div>
        
    </div>
</div>

{% endblock %}
