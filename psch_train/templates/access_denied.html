{% extends "base.html" %}
{% block title %}Access Denied | PsySim{% endblock %}

{% block content %}

<div class="min-h-[60vh] flex items-center justify-center">
    <div class="st-card-static p-12 text-center max-w-lg relative overflow-hidden">
        
        <!-- Background Pattern -->
        <div class="absolute inset-0 opacity-5">
            <div class="absolute inset-0" style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(225, 29, 72, 0.1) 2px, rgba(225, 29, 72, 0.1) 4px);"></div>
        </div>
        
        <!-- Icon -->
        <div class="icon-box icon-box-lg icon-box-red mx-auto mb-8 relative z-10">
            <i data-lucide="lock" class="w-8 h-8 text-rose-500"></i>
        </div>
        
        <!-- Title -->
        <h1 class="text-3xl md:text-4xl font-display font-bold text-white mb-6 relative z-10">
            Access Denied
        </h1>
        
        <!-- Message -->
        <p class="text-zinc-400 mb-2 relative z-10">
            This content is currently locked.
        </p>
        <p class="text-zinc-500 mb-8 relative z-10">
            You must complete the course 
            <span class="text-rose-400 font-medium">{{ course.title }}</span>
            before accessing this AI patient simulation.
        </p>
        
        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center relative z-10">
            <a href="/courses/" class="st-btn">
                <i data-lucide="book-open" class="w-4 h-4"></i>
                Go to Courses
            </a>
            <a href="/student/" class="st-btn st-btn-outline">
                <i data-lucide="home" class="w-4 h-4"></i>
                Dashboard
            </a>
        </div>
        
    </div>
</div>

{% endblock %}
