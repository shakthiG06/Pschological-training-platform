{% extends "base.html" %}
{% block title %}Access Denied | PsySim{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="card p-12 text-center max-w-lg mx-auto fade-up">
    
    <!-- Icon -->
    <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-red-100 to-rose-100 flex items-center justify-center mx-auto mb-6">
      <i data-lucide="shield-x" class="w-10 h-10 text-red-500"></i>
    </div>
    
    <!-- Title -->
    <h2 class="text-2xl font-display font-bold text-dark-800 mb-3">
      Access Denied
    </h2>
    
    <!-- Message -->
    <p class="text-dark-500 leading-relaxed mb-6">
      You must complete the course
      <span class="font-semibold text-dark-700">{{ course.title }}</span>
      before accessing this AI patient simulation.
    </p>
    
    <!-- Action -->
    <a href="/courses/" 
       class="btn-primary px-6 py-3 rounded-xl text-white font-semibold inline-flex items-center gap-2">
      <i data-lucide="book-open" class="w-5 h-5"></i>
      Go to Courses
    </a>
    
  </div>
</div>
{% endblock %}
