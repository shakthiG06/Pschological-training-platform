<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* Font utilities */
    .font-heading {
      font-family: 'Playfair Display', serif;
    }

    .font-ui {
      font-family: 'Poppins', sans-serif;
    }

    /* Page fade */
    .fade-in {
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Slide animations */
    .slide-left {
      animation: slideLeft 0.9s ease-out;
    }

    @keyframes slideLeft {
      from {
        opacity: 0;
        transform: translateX(-40px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .slide-right {
      animation: slideRight 0.9s ease-out;
    }

    @keyframes slideRight {
      from {
        opacity: 0;
        transform: translateX(40px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-purple-900 via-pink-700 to-rose-500 fade-in font-ui">

  <div class="bg-white rounded-2xl shadow-2xl w-[900px] h-[520px] flex overflow-hidden">

    <!-- Left Panel -->
    <div class="w-1/2 bg-gradient-to-br from-pink-600 to-purple-700 text-white
                flex items-center justify-center slide-left relative">

      <div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_top_left,_#fff,_transparent)]"></div>

      <div class="text-center px-10 z-10">
        <h2 class="text-3xl font-heading font-bold mb-4">
          Welcome Back
        </h2>
        <p class="text-sm opacity-90 leading-relaxed">
          Continue your journey in AI-powered psychology training.
        </p>
      </div>
    </div>

    <!-- Login Form -->
    <div class="w-1/2 flex flex-col justify-center px-12 slide-right">

      <div class="text-center mb-8">
        <div class="mx-auto w-16 h-16 rounded-full bg-pink-600
                    flex items-center justify-center text-white text-2xl
                    shadow-lg transform transition hover:scale-110">
          👤
        </div>

        <h2 class="text-2xl font-heading font-semibold mt-4">
          Login
        </h2>

        <p class="text-sm text-gray-500">
          {{ role|title }} Account
        </p>
      </div>

      <form method="post" class="space-y-6">
        {% csrf_token %}

        <!-- Username -->
        <div class="relative">
          <input type="text" name="username" placeholder="Username or Email"
            class="peer w-full border-b-2 border-gray-300 focus:border-pink-600
                   outline-none py-2 transition-all text-sm font-ui">
          <span class="absolute left-0 bottom-0 w-0 h-[2px] bg-pink-600
                       transition-all peer-focus:w-full"></span>
        </div>

        <!-- Password -->
        <div class="relative">
          <input type="password" name="password" placeholder="Password"
            class="peer w-full border-b-2 border-gray-300 focus:border-pink-600
                   outline-none py-2 transition-all text-sm font-ui">
          <span class="absolute left-0 bottom-0 w-0 h-[2px] bg-pink-600
                       transition-all peer-focus:w-full"></span>
        </div>

        <div class="text-right text-sm text-pink-600 hover:underline transition">
          <a href="#">Forgot password?</a>
        </div>

        <!-- Login Button -->
        <button
          class="w-full py-3 rounded-full bg-pink-600 text-white
                 font-medium tracking-wide
                 transform transition hover:scale-[1.03] hover:bg-pink-700
                 active:scale-95 shadow-lg">
          LOGIN
        </button>
      </form>

      <!-- Divider -->
      <div class="mt-8 text-center text-sm text-gray-400">
        Or continue with
      </div>

      <!-- Social Icons -->
      <div class="flex justify-center gap-4 mt-4">
        <div class="w-10 h-10 rounded-full border flex items-center justify-center
                    cursor-pointer transform transition hover:scale-110 hover:bg-gray-100">
          G
        </div>
        <div class="w-10 h-10 rounded-full border flex items-center justify-center
                    cursor-pointer transform transition hover:scale-110 hover:bg-gray-100">
          f
        </div>
      </div>

    </div>

  </div>

</body>
</html>
