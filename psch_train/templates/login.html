<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | PsySim</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #e11d48;
            --primary-light: #fb7185;
            --bg-dark: #09090b;
            --bg-card: #18181b;
            --bg-elevated: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
        }

        .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Background Pattern */
        .bg-pattern {
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(225, 29, 72, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(225, 29, 72, 0.04) 0%, transparent 50%);
        }

        .bg-grid {
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(135deg, #e11d48, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Login Card */
        .login-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        }

        /* Input Styles */
        .st-input {
            background: var(--bg-elevated);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px 16px 16px 52px;
            color: var(--text-primary);
            width: 100%;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .st-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.15);
        }

        .st-input::placeholder {
            color: #71717a;
        }

        /* Button */
        .st-btn {
            background: linear-gradient(135deg, var(--primary), #9f1239);
            color: white;
            padding: 16px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .st-btn:hover {
            box-shadow: 0 8px 24px -4px rgba(225, 29, 72, 0.5);
            transform: translateY(-2px);
        }

        .st-btn:active {
            transform: translateY(0);
        }

        /* Icon Box */
        .icon-box {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: rgba(225, 29, 72, 0.1);
            border: 1px solid rgba(225, 29, 72, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Input Icon */
        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #71717a;
            transition: color 0.2s ease;
        }

        .input-wrapper:focus-within .input-icon {
            color: var(--primary);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        /* Error Alert */
        .error-alert {
            background: rgba(225, 29, 72, 0.1);
            border: 1px solid rgba(225, 29, 72, 0.25);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--primary-light);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.875rem;
        }

        /* Glow Orb */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen bg-pattern">
    <!-- Background Grid -->
    <div class="fixed inset-0 bg-grid pointer-events-none"></div>
    
    <!-- Glow Orbs -->
    <div class="glow-orb w-80 h-80 bg-rose-500/10 -top-40 -right-40"></div>
    <div class="glow-orb w-64 h-64 bg-rose-500/5 -bottom-32 -left-32"></div>

    <div class="login-card w-full max-w-md p-10 fade-in-up relative z-10 mx-4">
        
        <!-- Logo & Title -->
        <div class="text-center mb-10">
            <div class="icon-box mx-auto mb-6">
                {% if role == 'student' %}
                <i data-lucide="graduation-cap" class="w-9 h-9 text-rose-500"></i>
                {% else %}
                <i data-lucide="shield-check" class="w-9 h-9 text-rose-500"></i>
                {% endif %}
            </div>
            
            <h1 class="text-3xl font-display font-bold text-white mb-2">
                Welcome Back
            </h1>
            <p class="text-zinc-400">
                Sign in as <span class="text-rose-400 font-medium">{{ role|title }}</span>
            </p>
        </div>
        
        <!-- Login Form -->
        <form method="post" class="space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div class="input-wrapper relative">
                <i data-lucide="user" class="w-5 h-5 input-icon"></i>
                <input type="text" name="username" placeholder="Username" required
                    class="st-input">
            </div>

            <!-- Password -->
            <div class="input-wrapper relative">
                <i data-lucide="lock" class="w-5 h-5 input-icon"></i>
                <input type="password" name="password" placeholder="Password" required
                    class="st-input">
            </div>

            <!-- Error Message -->
            {% if error %}
            <div class="error-alert">
                <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- Submit Button -->
            <button type="submit" class="st-btn mt-2">
                <i data-lucide="log-in" class="w-5 h-5"></i>
                Sign In
            </button>
        </form>
        
        <!-- Divider -->
        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-zinc-800"></div>
            </div>
            <div class="relative flex justify-center">
                <span class="bg-zinc-900 px-4 text-sm text-zinc-500">or</span>
            </div>
        </div>
        
        <!-- Back Link -->
        <a href="{% url 'role_select' %}" class="flex items-center justify-center gap-2 text-zinc-400 hover:text-rose-400 transition-colors text-sm group">
            <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
            Choose a different role
        </a>
        
        <!-- Footer -->
        <div class="mt-10 pt-6 border-t border-zinc-800/50 text-center">
            <p class="text-zinc-600 text-xs">
                © 2026 PsySim. Secure authentication.
            </p>
        </div>
        
    </div>
    
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
