<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PsySim</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --st-black: #0a0a0a;
            --st-dark: #111111;
            --st-red: #e11d48;
            --st-red-glow: #ff2d55;
            --st-cream: #f5f5dc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--st-black);
            min-height: 100vh;
            overflow: hidden;
        }

        .font-stranger {
            font-family: 'Special Elite', cursive;
            letter-spacing: 0.15em;
        }

        .neon-text {
            color: var(--st-red);
            text-shadow: 
                0 0 5px var(--st-red-glow),
                0 0 10px var(--st-red-glow),
                0 0 20px var(--st-red-glow);
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 
                    0 0 5px var(--st-red-glow),
                    0 0 10px var(--st-red-glow),
                    0 0 20px var(--st-red-glow);
            }
            20%, 24%, 55% {
                text-shadow: none;
            }
        }

        .flicker {
            animation: flicker 4s infinite alternate;
        }

        /* Christmas Lights */
        .christmas-lights {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: glow 2s ease-in-out infinite;
        }

        .light:nth-child(1) { background: #e11d48; animation-delay: 0s; }
        .light:nth-child(2) { background: #22c55e; animation-delay: 0.25s; }
        .light:nth-child(3) { background: #3b82f6; animation-delay: 0.5s; }
        .light:nth-child(4) { background: #eab308; animation-delay: 0.75s; }
        .light:nth-child(5) { background: #e11d48; animation-delay: 1s; }

        @keyframes glow {
            0%, 100% { opacity: 0.3; box-shadow: none; }
            50% { opacity: 1; box-shadow: 0 0 12px currentColor, 0 0 24px currentColor; }
        }

        /* Login Card */
        .login-card {
            background: linear-gradient(145deg, rgba(17, 17, 17, 0.95), rgba(10, 10, 10, 0.98));
            border: 1px solid rgba(225, 29, 72, 0.3);
            box-shadow: 
                0 0 40px rgba(225, 29, 72, 0.1),
                inset 0 0 40px rgba(0, 0, 0, 0.5);
        }

        /* Input Styles */
        .st-input {
            background: rgba(17, 17, 17, 0.8);
            border: 1px solid rgba(225, 29, 72, 0.3);
            border-radius: 4px;
            padding: 14px 16px 14px 48px;
            color: var(--st-cream);
            width: 100%;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .st-input:focus {
            outline: none;
            border-color: var(--st-red);
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.2);
        }

        .st-input::placeholder {
            color: #6b7280;
        }

        /* Button */
        .st-btn {
            background: linear-gradient(135deg, var(--st-red), #9f1239);
            color: white;
            padding: 14px 28px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            width: 100%;
            border: none;
            cursor: pointer;
        }

        .st-btn:hover {
            box-shadow: 
                0 0 25px rgba(225, 29, 72, 0.5),
                0 0 50px rgba(225, 29, 72, 0.3);
            transform: translateY(-2px);
        }

        /* VHS Scanlines */
        .vhs-overlay {
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 9999;
        }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--st-red);
            border-radius: 50%;
            opacity: 0.2;
            animation: floatUp 20s infinite;
        }

        @keyframes floatUp {
            0%, 100% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="flex items-center justify-center">
    <!-- VHS Overlay -->
    <div class="vhs-overlay"></div>
    
    <!-- Particles -->
    <div class="particle" style="left: 15%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 35%; animation-delay: 3s;"></div>
    <div class="particle" style="left: 55%; animation-delay: 1s;"></div>
    <div class="particle" style="left: 75%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 85%; animation-delay: 2s;"></div>

    <div class="login-card w-full max-w-md p-10 rounded-lg fade-in relative z-10 mx-4">
        
        <!-- Christmas Lights -->
        <div class="christmas-lights mb-8">
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
        </div>
        
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-stranger neon-text flicker tracking-[0.2em] mb-2">
                PSYSIM
            </h1>
            <p class="text-gray-500 text-sm tracking-widest uppercase">
                {{ role|title }} Access
            </p>
        </div>
        
        <!-- Role Icon -->
        <div class="flex justify-center mb-8">
            <div class="w-20 h-20 rounded-lg bg-red-900/30 border border-red-900/50 flex items-center justify-center">
                {% if role == 'student' %}
                <i data-lucide="graduation-cap" class="w-10 h-10 text-red-500"></i>
                {% else %}
                <i data-lucide="shield" class="w-10 h-10 text-red-500"></i>
                {% endif %}
            </div>
        </div>
        
        <!-- Login Form -->
        <form method="post" class="space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div class="relative">
                <i data-lucide="user" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                <input type="text" name="username" placeholder="Username" required
                    class="st-input">
            </div>

            <!-- Password -->
            <div class="relative">
                <i data-lucide="lock" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                <input type="password" name="password" placeholder="Password" required
                    class="st-input">
            </div>

            <!-- Error Message -->
            {% if error %}
            <div class="p-3 rounded bg-red-900/30 border border-red-900/50 text-red-400 text-sm flex items-center gap-2">
                <i data-lucide="alert-circle" class="w-4 h-4"></i>
                {{ error }}
            </div>
            {% endif %}

            <!-- Submit Button -->
            <button type="submit" class="st-btn mt-6">
                <span class="flex items-center justify-center gap-2">
                    <i data-lucide="log-in" class="w-5 h-5"></i>
                    Enter the Lab
                </span>
            </button>
        </form>
        
        <!-- Back Link -->
        <div class="mt-8 text-center">
            <a href="/" class="text-gray-500 hover:text-red-500 transition-colors text-sm flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Back to Role Selection
            </a>
        </div>
        
        <!-- Footer -->
        <p class="text-center text-gray-700 text-xs mt-8 font-stranger tracking-wider">
            HAWKINS LAB © 1986
        </p>
        
    </div>
    
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
