<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>{% block title %}PsySim{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        .font-heading {
            font-family: 'Playfair Display', serif;
        }

        .font-ui {
            font-family: 'Poppins', sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen fade-in font-ui">

<!-- NAVBAR -->
<nav class="bg-gradient-to-r from-purple-600 to-pink-600 text-white shadow">
  <div class="container mx-auto px-6 py-4 flex items-center justify-between">

    <!-- Brand -->
    <h1 class="text-2xl font-heading tracking-wide">
      PsySim
    </h1>

    <!-- Right Side -->
    <div class="flex items-center gap-6 text-sm font-medium">

      {% if request.user.is_authenticated %}

        {% if request.user.profile.role == "student" %}
          <a href="{% url 'student_dashboard' %}" class="hover:underline transition">
            Dashboard
          </a>
        {% endif %}

        {% if request.user.profile.role == "staff" %}
          <a href="{% url 'staff_dashboard' %}" class="hover:underline transition">
            Staff Dashboard
          </a>
        {% endif %}

        <!-- ✅ LOGOUT (POST FORM – FIXED) -->
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit"
                  class="px-4 py-1 rounded-full bg-white/20
                         hover:bg-white/30 transition">
            Logout
          </button>
        </form>

      {% else %}
        <span class="text-sm opacity-90 hidden md:block">
          Psychology Training Platform
        </span>
      {% endif %}

    </div>

  </div>
</nav>

<!-- PAGE CONTENT -->
<main class="container mx-auto p-6">
    {% block content %}{% endblock %}
</main>

</body>
</html>
