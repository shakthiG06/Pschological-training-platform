<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter the Lab | PsySim</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts - Stranger Things Style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --st-black: #0a0a0a;
            --st-red: #e11d48;
            --st-red-glow: #ff2d55;
            --st-cream: #f5f5dc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--st-black);
            min-height: 100vh;
            overflow: hidden;
        }

        .font-stranger {
            font-family: 'Special Elite', cursive;
            letter-spacing: 0.15em;
        }

        /* Neon Glow */
        .neon-text {
            color: var(--st-red);
            text-shadow: 
                0 0 5px var(--st-red-glow),
                0 0 10px var(--st-red-glow),
                0 0 20px var(--st-red-glow),
                0 0 40px var(--st-red);
        }

        /* Flicker Animation */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 
                    0 0 5px var(--st-red-glow),
                    0 0 10px var(--st-red-glow),
                    0 0 20px var(--st-red-glow),
                    0 0 40px var(--st-red);
                opacity: 1;
            }
            20%, 24%, 55% {
                text-shadow: none;
                opacity: 0.8;
            }
        }

        .flicker {
            animation: flicker 4s infinite alternate;
        }

        /* Christmas Lights */
        .christmas-lights {
            display: flex;
            gap: 24px;
            justify-content: center;
        }

        .light {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            animation: glow 2s ease-in-out infinite;
        }

        .light:nth-child(1) { background: #e11d48; animation-delay: 0s; }
        .light:nth-child(2) { background: #22c55e; animation-delay: 0.3s; }
        .light:nth-child(3) { background: #3b82f6; animation-delay: 0.6s; }
        .light:nth-child(4) { background: #eab308; animation-delay: 0.9s; }
        .light:nth-child(5) { background: #e11d48; animation-delay: 1.2s; }
        .light:nth-child(6) { background: #22c55e; animation-delay: 1.5s; }
        .light:nth-child(7) { background: #3b82f6; animation-delay: 1.8s; }

        @keyframes glow {
            0%, 100% { opacity: 0.3; box-shadow: none; }
            50% { opacity: 1; box-shadow: 0 0 15px currentColor, 0 0 30px currentColor; }
        }

        /* Role Card */
        .role-card {
            background: linear-gradient(145deg, rgba(17, 17, 17, 0.95), rgba(10, 10, 10, 0.98));
            border: 1px solid rgba(225, 29, 72, 0.2);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .role-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(225, 29, 72, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .role-card:hover::before {
            left: 100%;
        }

        .role-card:hover {
            border-color: var(--st-red);
            box-shadow: 
                0 0 30px rgba(225, 29, 72, 0.2),
                0 0 60px rgba(225, 29, 72, 0.1),
                inset 0 0 30px rgba(225, 29, 72, 0.05);
            transform: translateY(-5px);
        }

        .role-card:hover .role-icon {
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.5);
        }

        .role-icon {
            transition: all 0.4s ease;
        }

        /* VHS Scanlines */
        .vhs-overlay {
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 9999;
        }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--st-red);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Fade in */
        .fade-in {
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="flex items-center justify-center">
    <!-- VHS Overlay -->
    <div class="vhs-overlay"></div>
    
    <!-- Floating Particles -->
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 1s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 3s;"></div>
    <div class="particle" style="left: 80%; animation-delay: 5s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 2.5s;"></div>

    <div class="text-center fade-in relative z-10 px-6">
        
        <!-- Christmas Lights -->
        <div class="christmas-lights mb-10">
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
        </div>
        
        <!-- Title -->
        <h1 class="text-5xl md:text-7xl font-stranger neon-text flicker mb-4 tracking-[0.25em]">
            PSYSIM
        </h1>
        
        <p class="text-gray-500 tracking-[0.3em] text-sm mb-2 uppercase">
            Hawkins Psychology Laboratory
        </p>
        
        <p class="text-gray-600 mb-12 max-w-md mx-auto">
            Enter the Upside Down of clinical training. Choose your path wisely.
        </p>
        
        <!-- Role Selection -->
        <div class="flex flex-col md:flex-row gap-6 justify-center items-center">
            
            <!-- Student Card -->
            <a href="/login/student/" class="role-card w-72 p-8 rounded-lg text-left group">
                <div class="role-icon w-16 h-16 rounded-lg bg-red-900/30 flex items-center justify-center mb-6 border border-red-900/50">
                    <i data-lucide="graduation-cap" class="w-8 h-8 text-red-500"></i>
                </div>
                <h2 class="font-stranger text-xl text-red-500 mb-2 tracking-wider">STUDENT</h2>
                <p class="text-gray-500 text-sm mb-4">
                    Learn, practice with AI patients, and get evaluated by staff.
                </p>
                <span class="text-red-500 text-sm flex items-center gap-2 font-medium tracking-wide">
                    ENTER
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </span>
            </a>
            
            <!-- Staff Card -->
            <a href="/login/staff/" class="role-card w-72 p-8 rounded-lg text-left group">
                <div class="role-icon w-16 h-16 rounded-lg bg-red-900/30 flex items-center justify-center mb-6 border border-red-900/50">
                    <i data-lucide="shield" class="w-8 h-8 text-red-500"></i>
                </div>
                <h2 class="font-stranger text-xl text-red-500 mb-2 tracking-wider">STAFF</h2>
                <p class="text-gray-500 text-sm mb-4">
                    Review student sessions and provide clinical evaluations.
                </p>
                <span class="text-red-500 text-sm flex items-center gap-2 font-medium tracking-wide">
                    ENTER
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </span>
            </a>
            
        </div>
        
        <!-- Footer Text -->
        <p class="text-gray-700 text-xs mt-12 font-stranger tracking-[0.2em]">
            "FRIENDS DON'T LIE" - ELEVEN
        </p>
        
    </div>
    
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
